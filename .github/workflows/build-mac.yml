name: Build macOS App (M1 Arm64)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手动触发编译（我们用这个）

jobs:
  build:
    runs-on: macos-14 # M1 云端服务器，完美适配你的电脑
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt5 pillow numpy opencv-python

      - name: 编译 .app 程序
        run: |
          # 打包命令（适配项目结构+macOS图标）
          pyinstaller --onefile --windowed \
            --name "ImageScope" \
            --icon "res/ico.ico" \
            --add-data "res:res" \
            main.py

      - name: 压缩程序
        run: |
          cd dist
          zip -r ImageScope-Mac-M1.zip ImageScope.app

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: ImageScope-Mac-M1
          path: dist/ImageScope-Mac-M1.zip
