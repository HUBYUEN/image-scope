name: Build macOS App (M1 Arm64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt5 pillow numpy opencv-python

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
            --name "ImageScope" \
            --icon "res/ico.ico" \
            --add-data "res:res" \
            main.py

      - name: Zip
        run: |
          cd dist
          zip -r ImageScope-Mac-M1.zip ImageScope.app

      - uses: actions/upload-artifact@v4
        with:
          name: ImageScope-Mac-M1
          path: dist/ImageScope-Mac-M1.zip
