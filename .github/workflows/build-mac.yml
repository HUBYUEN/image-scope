name: Build macOS App (M1 Arm64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt5 pillow numpy opencv-python

      - name: Build .app
        run: |
          pyinstaller --onefile --windowed \
            --name "ImageScope" \
            --icon "res/ico.ico" \
            --add-data "res:res" \
            main.py

      - name: Zip app
        run: |
          cd dist
          zip -r ImageScope-Mac-M1.zip ImageScope.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ImageScope-Mac-M1
          path: dist/ImageScope-Mac-M1.zip
